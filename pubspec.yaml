name: agent_port
description: "Agent Port — Flutter client for Agent Monitor (tmux agent session monitor & control)."
publish_to: 'none'
version: 1.0.0+13

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (2.x — avoids analyzer conflict with codegen toolchain)
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.9.2
  web_socket_channel: ^3.0.3

  # Routing
  go_router: ^17.3.0

  # Models / codegen annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  xterm: ^4.0.0
  shared_preferences: ^2.5.5
  tray_manager: ^0.5.3
  image_picker: ^1.2.2
  wakelock_plus: ^1.2.8
  package_info_plus: ^10.1.0
  speech_to_text: ^7.0.0
  record: ^5.1.2
  crypto: ^3.0.6
  native_glass_navbar: ^1.0.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# record 5.2.1 pins a stale record_linux (0.7.2) that doesn't implement the
# resolved record_platform_interface 1.6.x — breaks the Dart kernel build on all
# platforms. Force a record_linux that matches the interface.
dependency_overrides:
  record_linux: ^1.3.1

  # Codegen
  build_runner: ^2.4.13
  freezed: ^3.1.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.png
    - assets/claude-avatar.png
    - assets/codex-avatar.png

# App icons for all platforms, generated from the single source PNG via
# `dart run flutter_launcher_icons`. The source is full-bleed (no alpha).
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0E0E0E"
    theme_color: "#FF6B4A"
