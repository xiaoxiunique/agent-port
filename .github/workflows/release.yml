name: Release

# Tag-triggered packaging. Push a tag like `v1.0.0` to build and attach the
# artifacts to that tag's GitHub Release. `workflow_dispatch` is also enabled so
# you can dry-run the build (artifacts only, no release upload) without tagging.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  macos-app:
    name: macOS app (.dmg, bundles Rust)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # The agent-monitor server lives in the sibling amux repo; it is built with
      # --features full and bundled by macos/scripts/bundle_rust_service.sh.
      - name: Checkout amux (server core)
        uses: actions/checkout@v4
        with:
          repository: xiaoxiunique/amux
          path: amux

      # Both arches so the Xcode build phase can emit a universal Rust binary
      # (BUNDLE_RUST_UNIVERSAL=1) that runs on Apple Silicon and Intel Macs.
      - name: Install Rust (arm64 + x86_64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: amux

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.6
          cache: true

      - run: flutter pub get

      # rmux is bundled into the .app by bundle_rust_service.sh (it prefers an
      # installed rmux); install it here so the build phase can copy it.
      - name: Install rmux (bundled into the app)
        run: brew install rmux

      # Triggers macos/scripts/bundle_rust_service.sh, which cargo-builds amux
      # (universal, --features full) and copies it + rmux into the .app's
      # Resources.
      - name: Build macOS app
        env:
          BUNDLE_RUST_UNIVERSAL: "1"
          AMUX_SRC: ${{ github.workspace }}/amux
        run: flutter build macos --release

      - name: Package .dmg and .zip
        run: |
          set -euo pipefail
          APP="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)"
          echo "App bundle: $APP"
          # Fail loudly if the Rust service did not make it into the bundle.
          test -x "$APP/Contents/Resources/agent-monitor-service" \
            || { echo "::error::Rust service binary missing from app bundle"; exit 1; }
          test -x "$APP/Contents/Resources/rmux" \
            || { echo "::error::rmux binary missing from app bundle"; exit 1; }
          lipo -archs "$APP/Contents/Resources/agent-monitor-service" || true
          mkdir -p dist
          VER="${GITHUB_REF_NAME:-dev}"
          hdiutil create -volname "AgentPort" -srcfolder "$APP" -ov -format UDZO \
            "dist/AgentPort-${VER}-macos.dmg"
          ditto -c -k --keepParent "$APP" "dist/AgentPort-${VER}-macos.zip"
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ### macOS app
            `AgentPort-*-macos.dmg` is **not code-signed / notarized**. On first
            launch macOS Gatekeeper will block it — **right-click the app → Open**
            (or run `xattr -dr com.apple.quarantine /Applications/agent_port.app`).
            The agent-monitor service (universal arm64+x86_64) is bundled inside
            the app — no extra install needed. The standalone service is
            published separately as the `amux` CLI (`brew install amux`).

  windows-app:
    name: Windows app (.zip, bundles amux + rmux)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The agent-monitor server lives in the sibling amux repo; on Windows it
      # is built core-only (the `full` feature is macOS-specific) and bundled by
      # windows/scripts/bundle_binaries.ps1.
      - name: Checkout amux (server core)
        uses: actions/checkout@v4
        with:
          repository: xiaoxiunique/amux
          path: amux

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: amux

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.6
          cache: true

      - run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      # cargo-builds amux.exe + downloads rmux.exe, both next to the Runner.
      - name: Bundle amux.exe + rmux.exe
        shell: pwsh
        run: ./windows/scripts/bundle_binaries.ps1 -AmuxSrc "${{ github.workspace }}\amux"

      - name: Package .zip
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $rel = "build\windows\x64\runner\Release"
          if (-not (Test-Path "$rel\amux.exe")) { throw "amux.exe missing from bundle" }
          if (-not (Test-Path "$rel\rmux.exe")) { throw "rmux.exe missing from bundle" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$rel\*" -DestinationPath "dist\AgentPort-$ver-windows-x64.zip" -Force
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: dist/*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body: |
            ### Windows app
            `AgentPort-*-windows-x64.zip` is a portable build — unzip and run
            `agent_port.exe`. It is **not code-signed**, so SmartScreen may warn
            on first launch (**More info → Run anyway**). `amux.exe` + `rmux.exe`
            are bundled alongside, so hosting the agent-monitor works with no
            extra install.

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # AGP 8.x / Gradle 8.14 require JDK 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.6
          cache: true

      - run: flutter pub get

      # Release buildType falls back to the debug signing key (no keystore in
      # repo), so this produces an installable, side-loadable APK — not a
      # Play-Store upload artifact.
      - name: Build APK
        run: flutter build apk --release

      - name: Stage APK
        run: |
          set -euo pipefail
          mkdir -p dist
          VER="${GITHUB_REF_NAME:-dev}"
          cp build/app/outputs/flutter-apk/app-release.apk "dist/AgentPort-${VER}-android.apk"
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
