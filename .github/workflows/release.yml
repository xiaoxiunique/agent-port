name: Release

# Tag-triggered packaging. Push a tag like `v1.0.0` to build and attach the
# artifacts to that tag's GitHub Release. `workflow_dispatch` is also enabled so
# you can dry-run the build (artifacts only, no release upload) without tagging.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  macos-app:
    name: macOS app (.dmg, bundles Rust)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # The agent-monitor server lives in the sibling amux repo; it is built with
      # --features full and bundled by macos/scripts/bundle_rust_service.sh.
      - name: Checkout amux (server core)
        uses: actions/checkout@v4
        with:
          repository: xiaoxiunique/amux
          path: amux

      # Both arches so the Xcode build phase can emit a universal Rust binary
      # (BUNDLE_RUST_UNIVERSAL=1) that runs on Apple Silicon and Intel Macs.
      - name: Install Rust (arm64 + x86_64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: amux

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.6
          cache: true

      - run: flutter pub get

      # Triggers macos/scripts/bundle_rust_service.sh, which cargo-builds amux
      # (universal, --features full) and copies it into the .app's Resources.
      - name: Build macOS app
        env:
          BUNDLE_RUST_UNIVERSAL: "1"
          AMUX_SRC: ${{ github.workspace }}/amux
        run: flutter build macos --release

      - name: Package .dmg and .zip
        run: |
          set -euo pipefail
          APP="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)"
          echo "App bundle: $APP"
          # Fail loudly if the Rust service did not make it into the bundle.
          test -x "$APP/Contents/Resources/agent-monitor-service" \
            || { echo "::error::Rust service binary missing from app bundle"; exit 1; }
          lipo -archs "$APP/Contents/Resources/agent-monitor-service" || true
          mkdir -p dist
          VER="${GITHUB_REF_NAME:-dev}"
          hdiutil create -volname "AgentPort" -srcfolder "$APP" -ov -format UDZO \
            "dist/AgentPort-${VER}-macos.dmg"
          ditto -c -k --keepParent "$APP" "dist/AgentPort-${VER}-macos.zip"
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ### macOS app
            `AgentPort-*-macos.dmg` is **not code-signed / notarized**. On first
            launch macOS Gatekeeper will block it — **right-click the app → Open**
            (or run `xattr -dr com.apple.quarantine /Applications/agent_port.app`).
            The agent-monitor service (universal arm64+x86_64) is bundled inside
            the app — no extra install needed. The standalone service is
            published separately as the `amux` CLI (`brew install amux`).

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # AGP 8.x / Gradle 8.14 require JDK 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.6
          cache: true

      - run: flutter pub get

      # Release buildType falls back to the debug signing key (no keystore in
      # repo), so this produces an installable, side-loadable APK — not a
      # Play-Store upload artifact.
      - name: Build APK
        run: flutter build apk --release

      - name: Stage APK
        run: |
          set -euo pipefail
          mkdir -p dist
          VER="${GITHUB_REF_NAME:-dev}"
          cp build/app/outputs/flutter-apk/app-release.apk "dist/AgentPort-${VER}-android.apk"
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
